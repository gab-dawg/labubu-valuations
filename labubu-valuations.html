<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Labubu Valuations</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f7f7f7;
      color: #222;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }
    h1 {
      margin-bottom: 8px;
    }
    p {
      color: #555;
    }
    input {
      width: 100%;
      max-width: 400px;
      padding: 10px 12px;
      margin: 20px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
    }
    th, td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid #eee;
    }
    th {
      background: #111;
      color: white;
    }
    tr:hover {
      background: #fafafa;
    }
    .tag {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eee;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Labubu Valuations</h1>
    <p>Track estimated retail and resale values for Labubu figures and series.</p>

    <input type="text" id="search" placeholder="Search by name or series..." />

    <table id="valuationTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Series</th>
          <th>Retail</th>
          <th>Market Range</th>
          <th>Rarity</th>
          <th>Updated</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    const data = [
      {
        name: "Labubu Blind Box Figure",
        series: "Standard Release",
        retail: "$20–$30",
        market: "$25–$60",
        rarity: "Common",
        updated: "2026-04-13"
      },
      {
        name: "Labubu Secret Edition",
        series: "Blind Box Secret",
        retail: "$20–$30",
        market: "$200+",
        rarity: "Secret",
        updated: "2026-04-13"
      },
      {
        name: "Mega Labubu",
        series: "Large Format",
        retail: "$950",
        market: "Varies",
        rarity: "Limited",
        updated: "2026-04-13"
      }
    ];

    const tbody = document.querySelector("#valuationTable tbody");
    const search = document.getElementById("search");

    function render(rows) {
      tbody.innerHTML = rows.map(item => `
        <tr>
          <td>${item.name}</td>
          <td>${item.series}</td>
          <td>${item.retail}</td>
          <td>${item.market}</td>
          <td><span class="tag">${item.rarity}</span></td>
          <td>${item.updated}</td>
        </tr>
      `).join("");
    }

    search.addEventListener("input", e => {
      const q = e.target.value.toLowerCase();
      const filtered = data.filter(item =>
        item.name.toLowerCase().includes(q) ||
        item.series.toLowerCase().includes(q)
      );
      render(filtered);
    });

    render(data);
  </script>
</body>
</html>
